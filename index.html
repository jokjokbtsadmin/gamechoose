<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Tinder Filters</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        /* Экран фильтров */
        #filter-screen { width: 100%; height: 100%; padding: 20px; box-sizing: border-box; text-align: center; overflow-y: auto; background: #121212; position: absolute; top: 0; left: 0; z-index: 200; display: flex; flex-direction: column; justify-content: center; }
        .filter-group { margin-bottom: 20px; text-align: left; }
        .filter-group label { display: block; margin-bottom: 10px; color: #888; font-size: 0.9rem; }
        select { width: 100%; padding: 12px; background: #1e1e1e; color: white; border: 1px solid #333; border-radius: 10px; font-size: 1rem; margin-bottom: 10px; }
        .start-btn { width: 100%; padding: 15px; background: #2ed573; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }

        #loader { display: none; font-size: 1.2rem; color: #2ed573; }
        .card-container { position: relative; width: 320px; height: 480px; display: none; }
        .card { position: absolute; width: 100%; height: 100%; background: #1e1e1e; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; transition: transform 0.4s ease, opacity 0.3s; }
        .card img { width: 100%; height: 70%; object-fit: cover; pointer-events: none; }
        .card-info { padding: 15px; text-align: center; }
        .card h2 { margin: 5px 0; font-size: 1.1rem; }
        
        .buttons { position: fixed; bottom: 30px; display: none; gap: 30px; z-index: 10; }
        button.swipe-btn { border: none; width: 65px; height: 65px; border-radius: 50%; font-size: 28px; cursor: pointer; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: 0.2s; }
        .no { background: #ff4757; }
        .yes { background: #2ed573; }
        
        #final-screen { display: none; width: 100%; height: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; text-align: center; background: #121212; position: absolute; top: 0; left: 0; z-index: 100; }
        .top-item { background: #1e1e1e; padding: 10px; margin: 8px 0; border-radius: 10px; border-left: 4px solid #2ed573; text-align: left; }
    </style>
</head>
<body>

    <div id="filter-screen">
        <h1 style="color: #2ed573; margin-top: 0;">Настрой поиск 🎮</h1>
        
        <div class="filter-group">
            <label>Жанр:</label>
            <select id="genre-select">
                <option value="">Все жанры</option>
                <option value="action">Экшен</option>
                <option value="role-playing-games-rpg">RPG</option>
                <option value="shooter">Шутер</option>
                <option value="adventure">Приключения</option>
                <option value="strategy">Стратегия</option>
                <option value="indie">Инди</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Режим игры:</label>
            <select id="mode-select">
                <option value="">Любой</option>
                <option value="singleplayer">Одиночная (Singleplayer)</option>
                <option value="multiplayer,co-op">Кооператив / Мультиплеер</option>
            </select>
        </div>

        <button class="start-btn" onclick="applyFilters()">Поехали!</button>
    </div>

    <div id="loader">Ищем игры по вкусу... 🎮</div>

    <div class="card-container" id="container"></div>

    <div class="buttons" id="controls">
        <button class="swipe-btn no" onclick="swipe('left')">✖</button>
        <button class="swipe-btn yes" onclick="swipe('right')">❤</button>
    </div>

    <div id="final-screen">
        <h1 style="color: #2ed573;">Твой выбор</h1>
        <div id="top-list"></div>
        <button onclick="location.reload()" style="width: auto; border-radius: 10px; font-size: 16px; padding: 10px 20px; background: #5352ed; margin-top: 20px; color: white; border:none;">Заново</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_KEY = 'ad20879ffb4a4b1990685bfc32a1e9e1';
        let games = [];
        let likedGames = [];
        let currentIdx = 0;

        async function applyFilters() {
            const genre = document.getElementById('genre-select').value;
            const mode = document.getElementById('mode-select').value;
            
            document.getElementById('filter-screen').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            let apiUrl = `https://api.rawg.io/api/games?key=${API_KEY}&page_size=20&ordering=-added`;
            if (genre) apiUrl += `&genres=${genre}`;
            if (mode) apiUrl += `&tags=${mode}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                games = data.results.map(g => ({
                    title: g.name,
                    img: g.background_image || 'https://via.placeholder.com/320x480?text=No+Image',
                    genre: g.genres.slice(0, 2).map(genre => genre.name).join(', '),
                    rating: g.rating
                }));
                
                if (games.length === 0) throw new Error();

                document.getElementById('loader').style.display = 'none';
                document.getElementById('container').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                renderCard();
            } catch (e) {
                document.getElementById('loader').innerHTML = "Игр не найдено 😢<br><br><button onclick='location.reload()' style='color:white; background:#5352ed; border:none; padding:10px; border-radius:5px;'>Назад</button>";
            }
        }

        function renderCard() {
            if (currentIdx >= games.length) {
                showFinalScreen();
                return;
            }
            const game = games[currentIdx];
            const container = document.getElementById('container');
            container.innerHTML = `
                <div class="card" id="active-card">
                    <img src="${game.img}">
                    <div class="card-info">
                        <h2>${game.title}</h2>
                        <p>${game.genre}</p>
                        <p style="color: #2ed573; font-weight: bold; margin-top: 5px;">⭐ ${game.rating}</p>
                    </div>
                </div>
            `;
        }

        function swipe(direction) {
            const card = document.getElementById('active-card');
            if (!card) return;

            if (direction === 'right') {
                likedGames.push(games[currentIdx].title);
                card.style.transform = 'translateX(200px) rotate(20deg)';
            } else {
                card.style.transform = 'translateX(-200px) rotate(-20deg)';
            }
            card.style.opacity = '0';

            setTimeout(() => {
                currentIdx++;
                renderCard();
            }, 300);
        }

        function showFinalScreen() {
            document.getElementById('controls').style.display = 'none';
            document.getElementById('container').style.display = 'none';
            const screen = document.getElementById('final-screen');
            const list = document.getElementById('top-list');
            screen.style.display = 'block';
            list.innerHTML = likedGames.length ? likedGames.map((g, i) => `<div class="top-item"><strong>${i+1}.</strong> ${g}</div>`).join('') : "<p>Ничего не выбрано</p>";
        }
    </script>
</body>
</html>
