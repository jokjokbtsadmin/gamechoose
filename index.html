<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Game Tinder - Pure Co-op Edition</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        #filter-screen { width: 100%; height: 100%; padding: 30px; box-sizing: border-box; text-align: center; background: #0f0f0f; position: absolute; z-index: 200; display: flex; flex-direction: column; justify-content: center; }
        .filter-group { margin-bottom: 25px; text-align: left; }
        .filter-group label { display: block; margin-bottom: 8px; color: #5bc0de; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }
        select { width: 100%; padding: 16px; background: #1a1a1a; color: white; border: 2px solid #333; border-radius: 15px; font-size: 1rem; outline: none; }
        .start-btn { width: 100%; padding: 20px; background: #2ed573; color: white; border: none; border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; box-shadow: 0 5px 20px rgba(46, 213, 115, 0.4); }
        #loader { display: none; text-align: center; color: #2ed573; font-size: 1.2rem; }
        .card-container { position: relative; width: 340px; height: 500px; display: none; }
        .card { position: absolute; width: 100%; height: 100%; background: #1a1a1a; border-radius: 25px; overflow: hidden; box-shadow: 0 20px 40px rgba(0,0,0,0.7); display: flex; flex-direction: column; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s; border: 1px solid #2a2a2a; }
        .card img { width: 100%; height: 65%; object-fit: cover; }
        .card-info { padding: 20px; text-align: center; }
        .card h2 { margin: 0; font-size: 1.3rem; margin-bottom: 10px; }
        .buttons { position: fixed; bottom: 40px; display: none; gap: 40px; z-index: 10; }
        .swipe-btn { border: none; width: 75px; height: 75px; border-radius: 50%; font-size: 32px; cursor: pointer; color: white; transition: 0.2s; }
        .no { background: #ff4757; } .yes { background: #2ed573; }
        #final-screen { display: none; width: 100%; height: 100%; padding: 25px; box-sizing: border-box; overflow-y: auto; background: #0f0f0f; position: absolute; z-index: 300; text-align: center; }
        .top-item { background: #1a1a1a; padding: 15px; margin: 10px 0; border-radius: 15px; border-left: 5px solid #2ed573; text-align: left; }
    </style>
</head>
<body>

    <div id="filter-screen">
        <h1 style="color: #2ed573;">Game Tinder 🎮</h1>
        <div class="filter-group">
            <label>Жанр</label>
            <select id="genre-select">
                <option value="">Любой жанр</option>
                <option value="4">Экшен</option>
                <option value="5">RPG</option>
                <option value="2">Шутер</option>
                <option value="3">Приключения</option>
            </select>
        </div>
        <div class="filter-group">
            <label>Режим</label>
            <select id="mode-select">
                <option value="any">Любой</option>
                <option value="single">Только Одиночная</option>
                <option value="coop">Только Кооператив</option>
            </select>
        </div>
        <button class="start-btn" onclick="applyFilters()">Найти игры</button>
    </div>

    <div id="loader">Анализируем базу... 🔍</div>

    <div class="card-container" id="container"></div>

    <div class="buttons" id="controls">
        <button class="swipe-btn no" onclick="swipe('left')">✖</button>
        <button class="swipe-btn yes" onclick="swipe('right')">❤</button>
    </div>

    <div id="final-screen">
        <h2 style="color: #2ed573;">Твой выбор</h2>
        <div id="top-list"></div>
        <button onclick="location.reload()" style="background: #5352ed; color: white; border: none; padding: 15px 30px; border-radius: 15px; margin-top: 20px;">Заново</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const API_KEY = 'ad20879ffb4a4b1990685bfc32a1e9e1';
        let games = [];
        let likedGames = [];
        let currentIdx = 0;

        async function applyFilters() {
            const genre = document.getElementById('genre-select').value;
            const mode = document.getElementById('mode-select').value;
            
            document.getElementById('filter-screen').style.display = 'none';
            document.getElementById('loader').style.display = 'block';

            // Берем случайную страницу из первых 5 (самые популярные)
            const randomPage = Math.floor(Math.random() * 5) + 1;
            
            // Запрос: Metacritic 60+, сортировка по популярности (-added)
            let apiUrl = `https://api.rawg.io/api/games?key=${API_KEY}&page_size=50&page=${randomPage}&ordering=-added&metacritic=60,100`;
            if (genre) apiUrl += `&genres=${genre}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                let filtered = data.results;

                // СТРОГАЯ ФИЛЬТРАЦИЯ В КОДЕ
                if (mode === 'coop') {
                    filtered = filtered.filter(g => 
                        g.tags && g.tags.some(t => 
                            ['co-op', 'co-operative', 'multiplayer'].includes(t.slug)
                        )
                    );
                } else if (mode === 'single') {
                    filtered = filtered.filter(g => 
                        g.tags && g.tags.some(t => t.slug === 'singleplayer')
                    );
                }

                games = filtered.slice(0, 20).map(g => ({
                    title: g.name,
                    img: g.background_image,
                    genre: g.genres.slice(0, 1).map(gn => gn.name),
                    rating: g.rating
                }));

                if (games.length === 0) throw new Error();

                document.getElementById('loader').style.display = 'none';
                document.getElementById('container').style.display = 'block';
                document.getElementById('controls').style.display = 'flex';
                renderCard();
            } catch (e) {
                document.getElementById('loader').innerHTML = "Игр не найдено. Попробуй другие фильтры!<br><br><button onclick='location.reload()'>Назад</button>";
            }
        }

        function renderCard() {
            if (currentIdx >= games.length) { showFinalScreen(); return; }
            const game = games[currentIdx];
            document.getElementById('container').innerHTML = `
                <div class="card" id="active-card">
                    <img src="${game.img}">
                    <div class="card-info">
                        <h2>${game.title}</h2>
                        <p>${game.genre} | ⭐ ${game.rating}</p>
                    </div>
                </div>
            `;
        }

        function swipe(dir) {
            const card = document.getElementById('active-card');
            if (!card) return;
            card.style.transform = dir === 'right' ? 'translateX(400px) rotate(40deg)' : 'translateX(-400px) rotate(-40deg)';
            card.style.opacity = '0';
            if (dir === 'right') likedGames.push(games[currentIdx].title);
            setTimeout(() => { currentIdx++; renderCard(); }, 300);
        }

        function showFinalScreen() {
            document.getElementById('controls').style.display = 'none';
            document.getElementById('container').style.display = 'none';
            document.getElementById('final-screen').style.display = 'block';
            document.getElementById('top-list').innerHTML = likedGames.map((g, i) => `<div class="top-item">${i+1}. ${g}</div>`).join('');
        }
    </script>
</body>
</html>
